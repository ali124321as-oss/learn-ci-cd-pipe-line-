version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: nestjs_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - nestgsData:/var/lib/postgresql/data
    networks:
      - nestjs_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: nestjs_pgadmin
    restart: always
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - nestjs_network

  backend:
    container_name: nestjs_backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3008:3000"
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - nestjs_network

volumes:
  nestgsData:


networks:
  nestjs_network:
    driver: bridge
