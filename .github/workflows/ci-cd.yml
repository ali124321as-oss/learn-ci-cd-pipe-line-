# ─────────────────────────────────────────────
# NAME OF YOUR PIPELINE
# Shows up in GitHub Actions tab
# ─────────────────────────────────────────────
name: NestJS CI/CD Pipeline


# ─────────────────────────────────────────────
# TRIGGERS — when should this pipeline run?
# ─────────────────────────────────────────────
on:
  push:
    branches: [main]        # Run when you push to main branch
  pull_request:
    branches: [main]        # Run when someone opens a pull request


# ─────────────────────────────────────────────
# JOBS — the actual work to be done
# A pipeline can have multiple jobs
# Each job runs on a separate machine
# ─────────────────────────────────────────────
jobs:

  # ═══════════════════════════════════════════
  # JOB 1 — BUILD AND TEST
  # Installs dependencies and runs your tests
  # ═══════════════════════════════════════════
  build:
    name: Build and Test        # Label shown on GitHub Actions UI
    runs-on: ubuntu-latest      # GitHub gives you a free Ubuntu machine


    # ─────────────────────────────────────────
    # SERVICES — extra containers this job needs
    # GitHub spins up a real PostgreSQL container
    # so your tests can connect to a real database
    # ─────────────────────────────────────────
    services:
      postgres:
        image: postgres:15-alpine       # Official PostgreSQL Docker image
        env:
          POSTGRES_USER: postgres       # Database username
          POSTGRES_PASSWORD: postgres   # Database password
          POSTGRES_DB: testdb           # Database name for tests
        ports:
          - 5432:5432                   # Expose postgres on port 5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          # ↑ Wait until PostgreSQL is fully ready
          # before running any steps
          # Without this your tests fail because
          # database is not ready yet


    # ─────────────────────────────────────────
    # STEPS — exact commands to run in order
    # Each step runs one after another
    # If one step fails — all next steps stop
    # ─────────────────────────────────────────
    steps:

      # STEP 1 — Get your code onto the machine
      # Without this the machine has no code to work with
      - name: Checkout code
        uses: actions/checkout@v4
        # "uses" means use a pre-built action
        # actions/checkout@v4 is made by GitHub
        # It clones your repo onto the runner machine


      # STEP 2 — Install Node.js on the machine
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'    # Use Node 18 (same as your Dockerfile)
          cache: 'npm'          # Cache node_modules between runs
                                # Makes future builds much faster


      # STEP 3 — Install your project dependencies
      - name: Install dependencies
        run: npm ci
        # "run" means execute a terminal command
        # npm ci = clean install (faster and safer than npm install)
        # It installs exactly what is in package-lock.json


      # STEP 4 — Run your tests
      - name: Run tests
        run: npm run test
        env:
          # These environment variables tell your NestJS app
          # how to connect to the PostgreSQL service above
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: testdb
          NODE_ENV: test


  # ═══════════════════════════════════════════
  # JOB 2 — DOCKER BUILD AND PUSH
  # Builds your Docker image and pushes to Docker Hub
  # This job only runs AFTER Job 1 passes
  # ═══════════════════════════════════════════
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    # ↑ "needs: build" means:
    # Only start this job if the "build" job passed
    # If tests fail → this job never runs
    # Your broken code never reaches Docker Hub

    if: github.ref == 'refs/heads/main'
    # ↑ Only push image when pushing to main branch
    # If someone opens a pull request → skip this job
    # We don't want to push unreviewed code to Docker Hub


    steps:

      # STEP 1 — Get your code again on this new machine
      - name: Checkout code
        uses: actions/checkout@v4


      # STEP 2 — Login to Docker Hub
      # This is where your GitHub Secrets are used
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          # ↑ GitHub reads these from your Secrets vault
          # and passes them to Docker login
          # They never appear in logs — shown as ****


      # STEP 3 — Setup Docker Buildx
      # Buildx is an advanced Docker builder
      # It builds images faster and supports caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      # STEP 4 — Build the image and push to Docker Hub
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          # ↑ Build from current directory (where Dockerfile is)

          push: true
          # ↑ After building, push to Docker Hub

          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nestjs-app:latest
            ${{ secrets.DOCKER_USERNAME }}/nestjs-app:${{ github.sha }}
          # ↑ Tag the image with two names:
          # 1. muhammadali432/nestjs-app:latest
          #    → always points to newest image
          # 2. muhammadali432/nestjs-app:abc123def
          #    → unique tag per commit (github.sha is commit ID)
          #    → lets you roll back to any previous version

          cache-from: type=gha
          cache-to: type=gha,mode=max
          # ↑ Cache Docker layers between pipeline runs
          # First build: 3-4 minutes
          # Later builds: 1-2 minutes (uses cached layers)
```

---

## How The Two Jobs Connect
```
You push code to GitHub
        ↓
┌─────────────────────┐
│  JOB 1: Build/Test  │
│                     │
│  • Install Node     │
│  • npm ci           │
│  • Start PostgreSQL │
│  • Run tests        │
└────────┬────────────┘
         │
    Tests pass? 
    ↙         ↘
   NO          YES
   ↓            ↓
Pipeline    ┌─────────────────────┐
stops       │  JOB 2: Docker      │
❌          │                     │
            │  • Login Docker Hub │
            │  • Build image      │
            │  • Push to Hub      │
            └─────────────────────┘
                      ↓
            Image live on Docker Hub ✅